<!-- 用瀏覽器截圖此頁面生成 og-image.png (1200x630) -->
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
.card {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #5c1a30 0%, #7a2840 50%, #5c1a30 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: -100px; right: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(232,85,61,0.3) 0%, transparent 70%);
}
.card::after {
  content: ''; position: absolute; bottom: -80px; left: -80px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(168,184,208,0.2) 0%, transparent 70%);
}
.badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); padding: 8px 20px; border-radius: 50px; font-size: 18px; margin-bottom: 20px; z-index: 1; }
.dot { width: 10px; height: 10px; background: #e8553d; border-radius: 50%; }
h1 { font-size: 72px; font-weight: 900; letter-spacing: 3px; z-index: 1; margin-bottom: 12px; }
p { font-size: 28px; opacity: 0.8; z-index: 1; }
.bottom { position: absolute; bottom: 30px; font-size: 16px; opacity: 0.6; z-index: 1; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
  <div class="badge"><span class="dot"></span> 每日更新</div>
  <h1>國教盟新聞摘要</h1>
  <p>兒少教育新聞精選 · 國教行動聯盟</p>
  <div class="bottom">weall888-jpg.github.io/daily-news</div>
</div>
</body>
</html>
